---
layout: default
---

<div class="container">
  <div class="row">

    <div class="col col-12">
      <div class="page-head">
        <h1 class="page-title">{{ page.title | escape }}</h1>
      </div>
    </div>

    {%if page.image %}
    <div class="col col-12">
      <div class="page-image animate">
        <img src="{{site.baseurl}}{{page.image}}" alt="{{page.title}}" fetchpriority="high">
      </div>
    </div>
    {% endif %}

  </div>
</div>

<!-- begin page -->
<div class="container animate">
  <article class="page">
    <div class="page__content">
      {{ content }}
    </div>
  </article>
</div>
<!-- end page -->
