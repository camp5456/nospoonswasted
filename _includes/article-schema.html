<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 200 | jsonify }},
  "image": "{{ page.image | absolute_url }}",
  "url": "{{ page.url | absolute_url }}",
  "datePublished": "{{ page.date | date: '%Y-%m-%dT%H:%M:%S+00:00' }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date: '%Y-%m-%dT%H:%M:%S+00:00' }}",
  "author": {
    "@type": "Person",
    "name": {{ page.author | default: site.data.settings.author.author__name | jsonify }},
    {% if page.author and page.author != site.data.settings.author.author__name %}
    "url": {{ page.author_url | default: "" | jsonify }}
    {% else %}
    "url": "{{ site.url }}/about/",
    "image": "{{ site.data.settings.author.author__avatar | absolute_url }}",
    "sameAs": [{% for social in site.data.settings.social %}"{{ social.link }}"{% unless forloop.last %},{% endunless %}{% endfor %}]
    {% endif %}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.data.settings.title | jsonify }},
    "url": {{ site.url | jsonify }},
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.data.settings.logo | absolute_url }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  }
}
</script>
{% if page.faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{% for item in page.faq %}{
    "@type": "Question",
    "name": {{ item.q | jsonify }},
    "acceptedAnswer": {
      "@type": "Answer",
      "text": {{ item.a | jsonify }}
    }
  }{% unless forloop.last %},{% endunless %}{% endfor %}]
}
</script>
{% endif %}
{% if page.how_to %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": {{ page.how_to.name | jsonify }},
  "description": {{ page.how_to.description | jsonify }},
  "step": [{% for step in page.how_to.steps %}{
    "@type": "HowToStep",
    "text": {{ step | jsonify }}
  }{% unless forloop.last %},{% endunless %}{% endfor %}]
}
</script>
{% endif %}
