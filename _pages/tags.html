---
layout: default
title: Tags
permalink: /tags/
sitemap: false
---

<section class="tags">
  <div class="container">
    <div class="row">
      <div class="col col-12">
        <div class="tag__info">
          <h2 class="tag__name">Browse by Tag</h2>
        </div>
        <ul>
          {% for cat in site.data.settings.blog__categories %}
            <li><a href="{{ site.baseurl }}/tags/{{ cat.tag }}/">{{ cat.title }}</a> ({{ site.tags[cat.tag].size | default: 0 }})</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</section>
