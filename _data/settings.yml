#-------------------------------
# Author Settings
author:
  author__name: Twila
  author__bio: I've been managing multiple chronic illnesses for over twenty-five years. A mold illness in my twenties led to fibromyalgia and other central nervous system disorders. I created No Spoons Wasted as a resource for fellow spoonies navigating life with low energy. The blog provides recipes, strategies, and products for the days when you just can't.
  author__avatar: '/images/bio.webp'

