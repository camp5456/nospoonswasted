- {icon: "fa-brands fa-pinterest", link: "https://www.pinterest.com/nospoonswasted/", name: "Pinterest"}
- {icon: "fa-brands fa-instagram", link: "https://www.instagram.com/nospoonswasted/", name: "Instagram"}
- {icon: "fa-brands fa-tiktok", link: "https://www.tiktok.com/@no.spoons_lifehacks?lang=en", name: "TikTok"}

